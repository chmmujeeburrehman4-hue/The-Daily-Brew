<!-- ========== HERO SLIDER ========== -->
<style>
.slider-main-sldr-d345 {
    width: 100%;
    max-width: 1350px;
    margin: 0px auto;
    position: relative;
    overflow: hidden;
}
.slider-track-sldr-d345 {
    display: flex;
    transition: transform 0.6s ease;
}
.slider-slide-sldr-d345 {
    min-width: 100%;
    position: relative;
    height: 100vh;
    min-height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.slider-slide-sldr-d345 img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}
.slider-overlay-sldr-d345 {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.35);
    z-index: 1;
}
.slider-content-sldr-d345 {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
}
.slider-tagline-sldr-d345 {
    font-family: sans-serif;
    font-size: 16px;
    color: #ffffff;
    margin: 0 0 14px 0;
    font-weight: 400;
    letter-spacing: 1px;
}
.slider-heading-sldr-d345 {
    font-family: sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.2;
    margin: 0 0 30px 0;
}
.slider-btn-sldr-d345 {
    display: inline-block;
    background-color: #e08a1e;
    color: #ffffff;
    font-family: sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 13px 36px;
    border-radius: 30px;
    text-decoration: none;
    transition: background 0.2s;
}
.slider-btn-sldr-d345:hover {
    background-color: #c97a10;
}
.slider-arrow-sldr-d345 {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
}
.slider-arrow-sldr-d345:hover {
    background: rgba(255, 255, 255, 0.30);
}
.slider-arrow-sldr-d345 svg {
    width: 20px;
    height: 20px;
    stroke: #ffffff;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
}
.slider-prev-sldr-d345 {
    left: 30px;
}
.slider-next-sldr-d345 {
    right: 30px;
}

    </button>
    <button class="slider-arrow-sldr-d345 slider-next-sldr-d345" id="slider-next-sldr-d345">

<script>
    // Header hamburger
    var hamburger = document.getElementById('hamburger-hdr-d345');
    var headerNav = document.getElementById('header-nav-hdr-d345');
    hamburger.addEventListener('click', function() {
        headerNav.classList.toggle('open-hdr-d345');
    });

    // Slider
    var track = document.getElementById('slider-track-sldr-d345');
    var slides = document.querySelectorAll('.slider-slide-sldr-d345');
    var prevBtn = document.getElementById('slider-prev-sldr-d345');
    var nextBtn = document.getElementById('slider-next-sldr-d345');
    var current = 0;
    var total = slides.length;

    function goToSlide(index) {
        if (index < 0) index = total - 1;
        if (index >= total) index = 0;
        current = index;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
    }

    prevBtn.addEventListener('click', function() {
        goToSlide(current - 1);
    });
    nextBtn.addEventListener('click', function() {
        goToSlide(current + 1);
    });

    // Auto slide every 4 seconds
    setInterval(function() {
        goToSlide(current + 1);
    }, 4000);
</script>
