<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.cofee-main-ohf-d345 {
  width: 100%;
  max-width: 1300px;
  margin: 0 auto;
  padding: 60px 0px;
}
.cofee-inner-efj-d345 {
  width: 100%;
}

/* FLEX ROW — CENTER FIX */
.cofee-all-shop-iew-d345 {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;   /* ← yahi center karta hai */
  gap: 90px;
}

/* LEFT SIDE */
.cofee-image-0iek-d345 {
  position: relative;
  flex: 0 0 auto;
  width: 340px;
  margin-bottom: 18px;
}
.left-side-image-d345 {
  width: 100%;
}
.left-side-image-d345 img {
  width: 320px;
  height: 360px;
  object-fit: cover;
  display: block;
  border-radius: 2px;
  border: 5px solid black;
}
.left-side-last-text-d345 {
  position: absolute;
  bottom: 24px;
  left: 58px;
  right: -20px;
  background: #fff;
  border: 5px solid black;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  text-align: center;
  width: 80%;
}
.heart-icon-d345 {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: #555;
  font-size: 13px;
}
.left-side-last-text-d345 p {
  font-size: 13.5px;
  color: #222;
  line-height: 1.5;
  font-style: italic;
}

/* RIGHT SIDE */
.righht-side-text-buttons-d345 {
  flex: 0 0 auto;
  width: 420px;       /* ← fixed width, left side par nahi jayega */
}
.cofee-subheading-orange-d345 {
  font-size: 14px;
  color: #c87941;
  font-style: italic;
  margin-bottom: 14px;
}
.cofee-heading-black-ewoj-d345 {
  margin-bottom: 18px;
}
.cofee-heading-black-ewoj-d345 h2 {
  font-size: 34px;
  font-weight: 700;
  color: #111;
  line-height: 1.25;
}
.cofee-para-d345 {
  margin-bottom: 22px;
}
.cofee-para-d345 p {
  font-size: 14.5px;
  color: #555;
  line-height: 1.7;
}
.cofee-coffee-types-d345 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 30px;
}
.type-link-d345 {
  font-size: 14px;
  color: #c87941;
  font-weight: 500;
  cursor: pointer;
}
.dot-d345 {
  color: #888;
  font-size: 16px;
}
.type-plain-d345 {
  font-size: 14px;
  color: #444;
  font-weight: 500;
}
.cofee-buttons-d345 {
  display: flex;
  align-items: center;
  gap: 22px;
}
.btn-aboutus-d345 {
  background: #c87941;
  color: #fff;
  border: none;
  padding: 13px 30px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.btn-seemore-d345 {
  background: transparent;
  border: none;
  color: #333;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* 1024px */
@media (max-width: 1024px) {
  .cofee-main-ohf-d345 {
   padding: 50px 0px; 
}
  .cofee-all-shop-iew-d345 {
   gap: 40px; 
}
  .cofee-image-0iek-d345 {
   width: 290px;
    }
  .left-side-image-d345 img { 
  	width: 270px; height: 310px;
  	 }
  .left-side-last-text-d345 { 
  	left: 20px; right: -10px; padding: 12px 14px;
  	 }
  .righht-side-text-buttons-d345 {
   width: 360px; 
}
  .cofee-heading-black-ewoj-d345 h2 {
   font-size: 28px; 
}
  .cofee-para-d345 p {
   font-size: 13.5px; 
}
}

/* 768px */
@media (max-width: 768px) {
  .cofee-main-ohf-d345{ 
  	padding: 40px 0px;
  	 }
  .cofee-all-shop-iew-d345 {
    flex-direction: column;
    align-items: center;
    gap: 50px;
    text-align: center;
  }
  .cofee-image-0iek-d345 { width: 100%; max-width: 420px; margin-bottom: 18px; }
  .left-side-image-d345 img { width: 100%; height: 320px; }
  .left-side-last-text-d345 {
    position: relative;
    bottom: auto; left: auto; right: auto;
    margin-top: 14px;
    border-radius: 6px;
    justify-content: center;
  }
  .righht-side-text-buttons-d345 { width: 100%; max-width: 420px; }
  .cofee-heading-black-ewoj-d345 h2 { font-size: 28px; }
  .cofee-subheading-orange-d345 { text-align: center; }
  .cofee-para-d345 p { text-align: center; }
  .cofee-coffee-types-d345 { justify-content: center; }
  .cofee-buttons-d345 { justify-content: center; }
}

/* 480px */
@media (max-width: 480px) {
  .cofee-main-ohf-d345 { padding: 30px 16px; }
  .left-side-image-d345 img { height: 260px; }
  .left-side-last-text-d345 { padding: 10px 12px; gap: 8px; }
  .left-side-last-text-d345 p { font-size: 12.5px; }
  .heart-icon-d345 { width: 24px; height: 24px; font-size: 11px; }
  .cofee-heading-black-ewoj-d345 h2 { font-size: 24px; line-height: 1.3; }
  .cofee-subheading-orange-d345 { font-size: 13px; }
  .cofee-para-d345 p { font-size: 13px; }
  .cofee-coffee-types-d345 { flex-wrap: wrap; }
  .btn-aboutus-d345 { padding: 11px 24px; font-size: 13px; }
  .btn-seemore-d345 { font-size: 13px; }
  .cofee-buttons-d345{ 
  	 gap: 16px;
  	 flex-wrap: wrap;
  	 justify-content: center; 
  }
  .cofee-all-shop-iew-d345 {
  width: 97%;
}
}
</style>

        </div>
      </div>
