<style>
.footer-main-ftr-d345 {
    width: 100%;
    background-color: #ffffff;
}
.footer-inner-ftr-d345 {
    width: 100%;
    max-width: 1300px;
    margin: 0px auto;
}
.footer-content-ftr-d345 {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    margin-top: 50px;
    margin-bottom: 50px;
}
.footer-logo-ftr-d345 {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
}
.footer-logo-ftr-d345 svg {
    width: 28px;
    height: 28px;
    stroke: #888888;
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
}
.footer-logo-ftr-d345 span {
    font-family: sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #444444;
}
.footer-desc-ftr-d345 {
    font-family: sans-serif;
    font-size: 15px;
    color: #888888;
    line-height: 1.8;
    max-width: 480px;
    margin: 0px 0px 30px 0px;
}
.footer-form-ftr-d345 {
    display: flex;
    align-items: center;
    margin-bottom: 30px;
    border: 1px solid #dddddd;
    border-radius: 30px;
    overflow: hidden;
    background-color: #ffffff;
}
.footer-form-ftr-d345 input {
    border: none;
    outline: none;
    font-family: sans-serif;
    font-size: 14px;
    color: #555555;
    background: transparent;
    line-height: 46px;
    text-indent: 20px;
    width: 240px;
}
.footer-form-ftr-d345 input::placeholder {
    color: #aaaaaa;
}
.footer-form-ftr-d345 button {
    background-color: #c8845a;
    color: #ffffff;
    font-family: sans-serif;
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    line-height: 48px;
    width: 120px;
    text-align: center;
    border-radius: 0px 30px 30px 0px;
    transition: background 0.2s;
}
.footer-form-ftr-d345 button:hover {
    background-color: #b5723f;
}
.footer-social-ftr-d345 {
    display: flex;
    align-items: center;
    gap: 20px;
}
.footer-social-ftr-d345 a {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: opacity 0.2s;
}
.footer-social-ftr-d345 a:hover {
    opacity: 0.6;
}
.footer-social-ftr-d345 a svg {
    width: 20px;
    height: 20px;
    stroke: #888888;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
}
.footer-social-ftr-d345 a .fill-icon-ftr-d345 {
    fill: #888888;
    stroke: none;
}
.footer-bottom-ftr-d345 {
    border-top: 1px solid #eeeeee;
    text-align: center;
}
.footer-bottom-ftr-d345 p {
    font-family: sans-serif;
    font-size: 13px;
    color: #aaaaaa;
    margin-top: 16px;
    margin-bottom: 16px;
}


/* ========== 1024px ========== */
@media (max-width: 1024px) {
    .footer-inner-ftr-d345 {
        margin: 0px 40px;
    }
    .footer-desc-ftr-d345 {
        max-width: 420px;
        font-size: 14px;
    }
}


/* ========== 768px ========== */
@media (max-width: 768px) {
    .footer-inner-ftr-d345 {
        margin: 0px 30px;
    }
    .footer-content-ftr-d345 {
        margin-top: 40px;
        margin-bottom: 40px;
    }
    .footer-desc-ftr-d345 {
        max-width: 100%;
        font-size: 14px;
    }
    .footer-form-ftr-d345 input {
        width: 180px;
    }
}


/* ========== 480px ========== */
@media (max-width: 480px) {
    .footer-inner-ftr-d345 {
        margin: 0px 20px;
    }
    .footer-content-ftr-d345 {
        margin-top: 30px;
        margin-bottom: 30px;
    }
    .footer-desc-ftr-d345 {
        font-size: 13px;
    }
    .footer-form-ftr-d345 {
        width: 100%;
    }
    .footer-form-ftr-d345 input {
        width: 100%;
        flex: 1;
    }
    .footer-form-ftr-d345 button {
        width: 110px;
        font-size: 14px;
    }
    .footer-logo-ftr-d345 span {
        font-size: 20px;
    }
    .footer-social-ftr-d345 {
        gap: 16px;
    }
}
</style>

<div class="footer-main-ftr-d345">
